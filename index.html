<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoufStock Enterprise ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--primary:#14532D;--secondary:#16A34A;--accent:#22C55E;
--bg:#F5F7FA;--text:#1E293B;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
height:100vh;overflow:hidden;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(-45deg,#14532D,#16A34A,#22C55E,#dff8e6);
background-size:400% 400%;
animation:bg 12s ease infinite;
}
@keyframes bg{
0%{background-position:0 50%}
50%{background-position:100% 50%}
100%{background-position:0 50%}
}
.card{
width:min(90%,520px);
background:rgba(255,255,255,.15);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.25);
border-radius:24px;
padding:40px;
text-align:center;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.logo{
width:90px;height:90px;margin:auto;
border-radius:20px;
background:white;color:#14532D;
display:flex;align-items:center;justify-content:center;
font-size:34px;font-weight:800;
}
h1{margin:20px 0 5px}
p{opacity:.9}
.progress{
margin-top:30px;height:12px;background:rgba(255,255,255,.25);
border-radius:50px;overflow:hidden;
}
.bar{
height:100%;width:0%;
background:white;
transition:width .25s;
}
.info{
margin-top:15px;font-size:14px
}
.footer{
margin-top:35px;font-size:12px;opacity:.8
}
</style>
</head>
<body>

<div class="card">
<div class="logo">SS</div>
<h1>SoufStock Enterprise ERP</h1>
<p id="status">Vérification de votre session...</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="info">
<span id="percent">0%</span>
</div>

<div class="footer">
Version 2.0 • Enterprise Edition
</div>
</div>

<script type="module">
const bar=document.getElementById("bar");
const percent=document.getElementById("percent");
const status=document.getElementById("status");

let p=0;

const timer=setInterval(()=>{
p+=2;
if(p>100)p=100;
bar.style.width=p+"%";
percent.textContent=p+"%";

if(p==25)status.textContent="Chargement de la configuration...";
if(p==50)status.textContent="Connexion sécurisée...";
if(p==75)status.textContent="Vérification de la session...";
if(p==100){
clearInterval(timer);
boot();
}
},40);

async function boot(){
try{

// Example:
// import { supabase } from "./assets/js/core/supabase.js";
// const {data}=await supabase.auth.getSession();

const hasSession=false;

if(hasSession){
window.location.replace("dashboard.html");
}else{
window.location.replace("login.html");
}

}catch(e){
status.textContent="Erreur de démarrage";
setTimeout(()=>window.location.replace("login.html"),1500);
}
}
</script>

</body>
</html>
