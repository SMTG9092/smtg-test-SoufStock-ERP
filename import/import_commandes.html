<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoufStock Enterprise ERP - Import Commandes</title>
    <link rel="stylesheet" href="/assets/css/import_commandes.css">
    <!-- SheetJS library for reading Excel files -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="erp-container">
        <header class="erp-header">
            <h1>SoufStock Enterprise - Module d'Importation</h1>
            <p>Gestion et synchronisation des commandes SAP (KG & Pièces)</p>
        </header>

        <main class="erp-main">
            <!-- Card Importation -->
            <section class="card-import">
                <h2>Importer un fichier Excel</h2>
                <div class="form-group">
                    <label for="importType">Type de Données :</label>
                    <select id="importType">
                        <option value="COMMANDES_KG">Commandes KG (commandes_excel)</option>
                        <option value="COMMANDES_PIECES">Commandes Pièces (commandes_clients_pieces)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="importMode">Mode d'Importation :</label>
                    <select id="importMode">
                        <option value="MISE_A_JOUR">Mise à jour / Synchronisation</option>
                        <option value="REMPLACER">Remplacer</option>
                    </select>
                </div>

                <div class="file-drop-zone" id="dropZone">
                    <input type="file" id="excelFile" accept=".xlsx, .xls" hidden>
                    <p>Glissez votre fichier Excel ici ou <span class="browse-link" id="browseTrigger">parcourez</span></p>
                    <span id="fileName" class="file-name">Aucun fichier sélectionné</span>
                </div>

                <button id="btnImport" class="btn-primary" disabled>Lancer l'analyse et l'import</button>
            </section>

            <!-- Logs et Résultats -->
            <section class="card-logs">
                <h2>Rapport d'Exécution</h2>
                <div id="logContainer" class="log-container">
                    <p class="log-info">En attente d'un fichier...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="/assets/js/commandes-import.js"></script>
</body>
</html>
