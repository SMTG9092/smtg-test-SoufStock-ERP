<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancement des Commandes - SoufStock</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-blue-600 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-rocket text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide">SoufStock ERP/WMS - Lancement</h1>
        </div>
        <div id="user-info" class="text-sm font-medium"></div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
        
        <!-- Stats & Actions Bar -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div>
                <h2 class="text-lg font-bold text-gray-800">Commandes en attente de lancement</h2>
                <p class="text-gray-500 text-sm">Sélectionnez les commandes et assignez les itinéraires pour lancer le picking.</p>
            </div>
            <button id="btn-refresh" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg flex items-center transition">
                <i class="fa-solid fa-rotate mr-2"></i> Actualiser
            </button>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl shadow-md border border-gray-150 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                    <thead class="bg-gray-50 text-gray-700 font-semibold uppercase text-xs tracking-wider">
                        <tr>
                            <th class="py-3 px-4">Doc Vente</th>
                            <th class="py-3 px-4">Client</th>
                            <th class="py-3 px-4">Date Création</th>
                            <th class="py-3 px-4">Date Livraison</th>
                            <th class="py-3 px-4">Itinéraire / Tournée</th>
                            <th class="py-3 px-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="commandes-table-body" class="divide-y divide-gray-200 text-gray-800">
                        <!-- Les lignes seront générées dynamiquement par JavaScript -->
                        <tr>
                            <td colspan="6" class="py-8 text-center text-gray-400">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                                <p>Chargement des commandes en attente...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Toast Notifications Grid -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Script منطق التحكم والربط وقاعدة البيانات -->
    <script type="module">
        // إعدادات الاتصال بـ Supabase (قم بتغييرها لمتغيرات البيئة الخاصة بك)
        const SUPABASE_URL = "https://votre-projet.supabase.co";
        const SUPABASE_KEY = "votre-cle-publique";
        const supabase = bootstrapSupabase();

        function bootstrapSupabase() {
            if (typeof window.supabase !== 'undefined') {
                return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
            return null;
        }

        // العناصر المرجعية في الصفحة
        const tableBody = document.getElementById("commandes-table-body");
        const btnRefresh = document.getElementById("btn-refresh");

        // محاكاة مستخدم حالي (يمكن ربطها بنظام الحماية الخاص بك)
        const currentUser = { id: "LOG-001", nom: "Responsable Logistique" };
        document.getElementById("user-info").innerText = `Session: ${currentUser.nom}`;

        // دالة جلب الطلبيات غير المطلقة بحالة IMPORTEE ولم تدرج بعد في suivi_commandes_lancer
        async function fetchCommandesEnAttente() {
            try {
                showLoading();

                // 1. جلب الطلبيات الفريدة من commandes_excel بحالة 'IMPORTEE'
                const { data: commandes, error: errCmd } = await supabase
                    .from("commandes_excel")
                    .select("document_vente, nom_receptionnaire, date_creation, date_livraison, itineraire, statut")
                    .eq("statut", "IMPORTEE");

                if (errCmd) throw errCmd;

                if (!commandes || commandes.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="6" class="py-8 text-center text-gray-500">
                                <i class="fa-solid fa-circle-check text-green-500 text-3xl mb-2"></i>
                                <p class="font-medium">Aucune commande en attente de lancement.</p>
                            </td>
                        </tr>`;
                    return;
                }

                // فلترة مجمعة للحصول على رقم الـ document_vente الفريد فقط
                const uniqueCommandes = [];
                const map = new Map();
                for (const item of commandes) {
                    if(!map.has(item.document_vente)){
                        map.set(item.document_vente, true);
                        uniqueCommandes.push(item);
                    }
                }

                renderTable(uniqueCommandes);
            } catch (error) {
                console.error(error);
                showToast("Erreur lors du chargement des données.", "error");
            }
        }

        // عرض مؤشر التحميل
        function showLoading() {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="6" class="py-8 text-center text-gray-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                        <p>Mise à jour de la liste...</p>
                    </td>
                </tr>`;
        }

        // بناء جدول الطلبيات داخل الواجهة
        function renderTable(commandes) {
            tableBody.innerHTML = "";
            
            commandes.forEach(cmd => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="py-3 px-4 font-semibold text-blue-600">${cmd.document_vente}</td>
                    <td class="py-3 px-4 font-medium">${cmd.nom_receptionnaire}</td>
                    <td class="py-3 px-4 text-gray-500">${formatDate(cmd.date_creation)}</td>
                    <td class="py-3 px-4 text-gray-500">${formatDate(cmd.date_livraison)}</td>
                    <td class="py-3 px-4">
                        <input type="text" id="route-${cmd.document_vente}" value="${cmd.itineraire || ''}" 
                            class="w-full bg-gray-50 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:border-blue-500 font-mono" placeholder="Ex: Tournée Nord">
                    </td>
                    <td class="py-3 px-4 text-center">
                        <button onclick="lancerCommande('${cmd.document_vente}', '${encodeURIComponent(cmd.nom_receptionnaire)}')"
                            class="bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-3 rounded text-xs flex items-center mx-auto transition shadow-sm">
                            <i class="fa-solid fa-paper-plane mr-1.5"></i> Lancer
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // دالة إطلاق الطلبية وتغيير حالتها في السيستم
        window.lancerCommande = async function(numVente, encodedClient) {
            const client = decodeURIComponent(encodedClient);
            const routeInput = document.getElementById(`route-${numVente}`);
            const itineraireSelectionne = routeInput ? routeInput.value.trim() : "";

            if (!itineraireSelectionne) {
                showToast("Veuillez spécifier un itinéraire avant le lancement.", "warning");
                return;
            }

            try {
                // 1. إدراج سطر جديد في جدول المتابعة المعتمد
                const { error: insErr } = await supabase
                    .from("suivi_commandes_lancer")
                    .insert({
                        document_vente: numVente,
                        nom_receptionnaire: client,
                        itineraire: itineraireSelectionne,
                        statut: "EN_PICKING",
                        date_lancement: new Date().toISOString()
                    });

                if (insErr) throw insErr;

                // 2. تحديث حالة الطلبية في جدول commandes_excel لكي تصبح 'LANCEE' أو 'EN_PICKING'
                const { error: updErr } = await supabase
                    .from("commandes_excel")
                    .update({ statut: "LANCEE" })
                    .eq("document_vente", numVente);

                if (updErr) throw updErr;

                showToast(`Commande ${numVente} lancée avec succès au picking !`, "success");
                // إعادة إنعاش اللائحة
                fetchCommandesEnAttente();

            } catch (error) {
                console.error(error);
                showToast("Échec du lancement de la commande.", "error");
            }
        };

        // تنسيق التاريخ
        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR');
        }

        // نظام التنبيهات السريعة (Toast Notification)
        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            
            const bgClass = type === "success" ? "bg-green-600" : type === "error" ? "bg-red-600" : "bg-amber-500";
            const iconClass = type === "success" ? "fa-check-circle" : type === "error" ? "fa-exclamation-circle" : "fa-exclamation-triangle";

            toast.className = `${bgClass} text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center space-x-2 transition duration-300 opacity-0 transform translate-y-2`;
            toast.innerHTML = `<i class="fa-solid ${iconClass}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("opacity-0", "translate-y-2"); }, 50);
            setTimeout(() => {
                toast.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // الاستماع للأحداث عند فتح الصفحة
        btnRefresh.addEventListener("click", fetchCommandesEnAttente);
        document.addEventListener("DOMContentLoaded", fetchCommandesEnAttente);
    </script>
</body>
</html>
