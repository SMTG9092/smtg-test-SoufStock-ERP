<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lancement - SoufStock ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">

    <!-- Header: العنوان، زر التصفح واسم المستخدم -->
    <header class="flex justify-between items-center bg-white p-4 rounded shadow mb-4">
        <h1 class="text-xl font-bold text-gray-700">Lancement Commande</h1>
        <div class="flex items-center gap-4">
            <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm"><i class="fa-solid fa-list"></i> Page Commande</button>
            <span class="font-semibold text-gray-600"><i class="fa-solid fa-user"></i> <span id="user-name">...</span></span>
        </div>
    </header>

    <!-- Stats Bar: التاريخ، الإحصائيات -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        <div class="bg-white p-3 rounded shadow text-center border-l-4 border-indigo-500">
            <span class="block text-xs text-gray-400">Date Ciblage</span>
            <input type="text" id="date-display" disabled class="font-bold text-sm text-gray-700 bg-transparent w-full text-center">
        </div>
        <div class="bg-white p-3 rounded shadow text-center border-l-4 border-yellow-500">
            <span class="block text-xs text-gray-400">En attente</span>
            <span id="stat-attente" class="font-bold text-lg">0</span>
        </div>
        <div class="bg-white p-3 rounded shadow text-center border-l-4 border-green-500">
            <span class="block text-xs text-gray-400">Lancées</span>
            <span id="stat-lancee" class="font-bold text-lg">0</span>
        </div>
        <div class="bg-white p-3 rounded shadow text-center border-l-4 border-blue-500">
            <span class="block text-xs text-gray-400">En Picking</span>
            <span id="stat-picking" class="font-bold text-lg">0</span>
        </div>
    </div>

    <!-- Mode Selector: اختيار الوضع (Radio Buttons) -->
    <div class="bg-white p-3 rounded shadow mb-4 flex gap-6 items-center">
        <span class="text-sm font-bold text-gray-600">Mode d'affichage:</span>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="mode" value="tournee" checked class="w-4 h-4">
            <span class="text-sm">Par Tournée</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="mode" value="commande" class="w-4 h-4">
            <span class="text-sm">Par Commande</span>
        </label>
        <div class="ml-auto">
            <button id="btn-lancer-tout" class="bg-green-600 text-white px-6 py-2 rounded font-bold shadow hover:bg-green-700">Lancer tout</button>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white p-4 rounded shadow">
        <table class="w-full text-sm">
            <thead id="table-head" class="text-gray-500 uppercase text-left border-b"></thead>
            <tbody id="commandes-table-body"></tbody>
        </table>
    </div>

</body>
</html>
