<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lancement - SoufStock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 1rem; }
        .section-title { color: #4f46e5; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem; display: flex; align-items: center; }
        th { background: #f9fafb; padding: 10px; text-align: left; font-size: 0.75rem; color: #6b7280; text-transform: uppercase; }
        td { padding: 15px 10px; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 p-6">

    <!-- Header Actions -->
    <div class="flex justify-between mb-6">
        <div class="flex gap-2">
            <input type="date" id="date-filter" class="border border-gray-300 rounded px-3 py-2 text-sm">
            <select id="mode-selector" class="border border-gray-300 rounded px-3 py-2 text-sm">
                <option value="tournee">Par Tournée</option>
                <option value="commande">Par Commande</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button class="bg-gray-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-gray-700">Actualiser</button>
            <button class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-green-700">Valider tout</button>
        </div>
    </div>

    <!-- Stats Bar (مطابق لستايل الإحصائيات أسفل صفحتك) -->
    <div class="card mb-6 flex gap-8 text-xs font-bold text-gray-600">
        <span>Articles distincts: <span id="stats-art">0</span></span>
        <span>Total Commandé: <span id="stats-kg">0</span> KG</span>
        <span>Total Préparé: <span id="stats-prep">0</span> KG</span>
    </div>

    <!-- Main Table Card -->
    <div class="card">
        <div class="section-title"><i class="fa-solid fa-list-ul mr-2"></i> Commandes à Lancer</div>
        <table class="w-full">
            <thead>
                <tr>
                    <th>Doc Vente</th><th>Client</th><th>Date Livraison</th><th>Tournée</th><th>Statut</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="commandes-table-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script type="module">
        // هنا ستضع نفس المنطق البرمجي السابق، مع التأكد أن الأزرار 
        // تأخذ class: "bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold"
    </script>
</body>
</html>
