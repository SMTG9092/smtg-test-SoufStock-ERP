<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lancement - SoufStock Enterprise ERP/WMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 1rem; }
        .section-title { color: #4f46e5; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem; display: flex; align-items: center; }
        th { background: #f9fafb; padding: 10px; text-align: left; font-size: 0.75rem; color: #6b7280; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #f3f4f6; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-gray-50 p-6">

    <!-- Header Actions -->
    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='commandes.html'" class="bg-gray-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-gray-700">
            <i class="fa-solid fa-arrow-left mr-2"></i> Retour aux Commandes
        </button>
        <div class="flex gap-2">
            <button id="btn-refresh" class="bg-gray-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-gray-700">Actualiser</button>
            <button id="btn-valider-tout" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-green-700">Valider tout</button>
        </div>
    </div>

    <!-- Filters -->
    <div class="card mb-6 flex gap-4 items-center">
        <input type="date" id="date-filter" class="border border-gray-300 rounded px-3 py-2 text-sm">
        <select id="mode-selector" class="border border-gray-300 rounded px-3 py-2 text-sm">
            <option value="tournee">Par Tournée</option>
            <option value="commande">Par Commande</option>
        </select>
    </div>

    <!-- Stats Bar -->
    <div class="card mb-6 flex gap-8 text-xs font-bold text-gray-600">
        <span>Articles distincts: <span id="stats-art">0</span></span>
        <span>Total Commandé: <span id="stats-kg">0</span> KG</span>
        <span>Total Préparé: <span id="stats-prep">0</span> KG</span>
    </div>

    <!-- Main Table -->
    <div class="card">
        <div class="section-title"><i class="fa-solid fa-list-ul mr-2"></i> Commandes à Lancer</div>
        <table class="w-full">
            <thead>
                <tr id="table-head"></tr>
            </thead>
            <tbody id="commandes-table-body"></tbody>
        </table>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';

        const modeSelector = document.getElementById('mode-selector');
        const tbody = document.getElementById('commandes-table-body');
        const head = document.getElementById('table-head');

        async function loadDashboard() {
            const mode = modeSelector.value;
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10">Chargement...</td></tr>';
            
            if (mode === 'tournee') {
                head.innerHTML = `<th>Tournée</th><th>Nb Commandes</th><th>Total KG</th><th>Statut</th><th>Action</th>`;
                // هنا logic جلب البيانات وتجميعها حسب الـ Tournée
            } else {
                head.innerHTML = `<th>Doc Vente</th><th>Client</th><th>Date Livraison</th><th>Tournée</th><th>Statut</th><th>Action</th>`;
                // هنا logic جلب البيانات بالتفصيل
            }
        }

        document.getElementById('btn-valider-tout').onclick = async () => {
            const mode = modeSelector.value;
            if(confirm("Êtes-vous sûr de vouloir valider tout le contenu affiché ?")) {
                // منطق الإطلاق المتعدد
                console.log("Lancement en mode:", mode);
            }
        };

        document.getElementById('btn-refresh').onclick = loadDashboard;
        modeSelector.onchange = loadDashboard;
        loadDashboard();
    </script>
</body>
</html>
