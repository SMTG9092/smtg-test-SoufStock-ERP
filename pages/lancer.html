<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lancement - SoufStock ERP/WMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-xl font-bold">SoufStock ERP/WMS</h1>
            <p class="text-xs">Utilisateur: <span id="user-display">Yahya Soufiane</span></p>
        </div>
        <button onclick="history.back()" class="bg-blue-700 px-4 py-2 rounded hover:bg-blue-800">Retour</button>
    </header>

    <!-- Stats Section -->
    <section class="p-6">
        <div class="flex gap-4 items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
            <input type="date" id="date-filter" class="border p-2 rounded w-40">
            <select id="mode-selector" class="border p-2 rounded" onchange="loadDashboard()">
                <option value="tournee">Par Tournée</option>
                <option value="commande">Par Commande</option>
            </select>
        </div>
        <div class="grid grid-cols-3 gap-4 text-center mb-6">
            <div class="p-4 bg-white rounded-lg shadow">Commandes: <span id="stats-cmd" class="font-bold">0</span></div>
            <div class="p-4 bg-white rounded-lg shadow">Total KG: <span id="stats-kg" class="font-bold">0</span></div>
            <div class="p-4 bg-white rounded-lg shadow">Picking: <span id="stats-picking" class="font-bold">0</span></div>
        </div>
    </section>

    <!-- Main Table -->
    <div class="p-6">
        <table class="w-full bg-white rounded-xl shadow-md overflow-hidden">
            <thead class="bg-gray-50 uppercase text-xs text-gray-700">
                <tr id="table-head"></tr>
            </thead>
            <tbody id="commandes-table-body" class="divide-y text-sm"></tbody>
        </table>
    </div>

    <!-- Modal Détails -->
    <div id="modal-details" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl w-3/4 max-h-[80vh] overflow-y-auto">
            <h3 class="text-lg font-bold mb-4">Détails Commande</h3>
            <div id="modal-content"></div>
            <button onclick="document.getElementById('modal-details').classList.add('hidden')" class="mt-4 bg-gray-500 text-white px-4 py-2 rounded">Fermer</button>
        </div>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';

        // تاريخ اليوم + 1 للـ Livraison
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date-filter').value = tomorrow.toISOString().split('T')[0];

        window.loadDashboard = async () => {
            const mode = document.getElementById('mode-selector').value;
            const head = document.getElementById('table-head');
            const tbody = document.getElementById('commandes-table-body');
            
            if (mode === 'tournee') {
                head.innerHTML = `<th class="py-3 px-4">Tournée</th><th class="py-3 px-4">Nb</th><th class="py-3 px-4">KG</th><th class="py-3 px-4">Action</th>`;
                // هنا يتم تنفيذ Query التجميع Group By Itineraire
            } else {
                head.innerHTML = `<th class="py-3 px-4">Commande</th><th class="py-3 px-4">Client</th><th class="py-3 px-4">KG</th><th class="py-3 px-4">Statut</th><th class="py-3 px-4">Action</th>`;
                // هنا يتم تنفيذ Query لجلب الطلبيات بالتفصيل
            }
        };

        window.showDetails = (doc) => {
            // كود عرض التفاصيل للقراءة فقط (Read Only)
            document.getElementById('modal-details').classList.remove('hidden');
        };

        loadDashboard();
    </script>
</body>
</html>
