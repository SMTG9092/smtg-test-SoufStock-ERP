<script type="module">
    import supabase from '../js/core/supabase.js';
    
    const params = new URLSearchParams(window.location.search);
    const cmd = params.get('cmd');
    
    document.getElementById('val-cmd').innerText = cmd;
    document.getElementById('val-client').innerText = params.get('client');
    document.getElementById('val-date').innerText = new Date().toLocaleString();

    async function loadData() {
        // تم تحديث اسم العمود إلى quantite_commandee بناءً على المخطط الذي أرفقته
        const { data, error } = await supabase
            .from('commandes_excel')
            .select('article, designation_article, quantite_commandee') 
            .eq('document_vente', cmd);

        if (error) {
            console.error("Erreur Supabase:", error);
            return;
        }

        if (data && data.length > 0) {
            let totalKg = 0;
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // تفريغ الجدول قبل التعبئة

            data.forEach(item => {
                // استخدام العمود الصحيح quantite_commandee
                const qte = Number(item.quantite_commandee || 0);
                totalKg += qte;
                
                tbody.innerHTML += `
                    <tr class="h-10 border-b border-black">
                        <td class="p-2 border-r border-black">${item.article} - ${item.designation_article}</td>
                        <td class="p-2 border-r border-black">${qte}</td>
                        <td class="p-2 border-r border-black">0</td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2"></td>
                    </tr>`;
            });
            document.getElementById('total-kg').innerText = totalKg;
        }
    }
    loadData();
</script>
