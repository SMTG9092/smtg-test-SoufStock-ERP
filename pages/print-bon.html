<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bon de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background: white; }
            .no-print { display: none; }
        }

        body { background-color: #f3f4f6; padding: 20px; }
        
        #bon-content {
            width: 277mm;
            min-height: 190mm;
            margin: 0 auto;
            background: white;
            padding: 10mm;
            display: flex;
            flex-direction: column;
            border: 1px solid #000;
        }

        /* الجدول */
        .table-container { flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #e5e7eb; font-weight: bold; }
        td, th { border: 1px solid black; padding: 10px; text-align: center; }
        .row-h { height: 45px; }
    </style>
</head>
<body>

    <div id="bon-content">
        <!-- الرأس -->
        <div class="border-2 border-black p-3 mb-4">
            <h1 class="text-3xl font-bold text-center">BON DE PRÉPARATION</h1>
        </div>

        <div class="flex justify-between mb-4 text-sm">
            <div>
                <p><strong>Commande:</strong> <span id="val-cmd"></span></p>
                <p><strong>Client:</strong> <span id="val-client"></span></p>
            </div>
            <div class="text-right">
                <p><strong>Date:</strong> <span id="val-date"></span></p>
            </div>
        </div>

        <!-- الجدول (الصفوف تضاف ديناميكياً) -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40%;">Article</th>
                        <th>Qté KG</th>
                        <th>NB Pieces</th>
                        <th>Lot</th>
                        <th>Qté Préparée</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- التذييل والتوقيعات -->
        <div class="mt-4">
            <div class="flex justify-between items-end">
                <table class="w-1/3">
                    <tr><th>TOTAL</th><th>Qté KG</th><th>Qté Pièces</th></tr>
                    <tr>
                        <td class="h-10"></td>
                        <td id="total-kg" class="font-bold">0</td>
                        <td id="total-pieces" class="font-bold">0</td>
                    </tr>
                </table>
                <div class="flex gap-4">
                    <div class="border border-black w-48 h-20 text-xs font-bold text-center pt-2">Signature Préparateur</div>
                    <div class="border border-black w-48 h-20 text-xs font-bold text-center pt-2">Signature Contrôle</div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-6 no-print">
        <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-3 rounded hover:bg-blue-700">Imprimer le Bon</button>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';
        
        const params = new URLSearchParams(window.location.search);
        const cmd = params.get('cmd');
        document.getElementById('val-cmd').innerText = cmd;
        document.getElementById('val-client').innerText = params.get('client');
        document.getElementById('val-date').innerText = new Date().toLocaleDateString();

        async function loadData() {
            try {
                const [resExcel, resPieces] = await Promise.all([
                    supabase.from('commandes_excel').select('*').eq('document_vente', cmd),
                    supabase.from('commandes_clients_pieces').select('article, nombre_pieces').eq('document_vente', cmd)
                ]);

                const dataExcel = resExcel.data || [];
                const dataPieces = resPieces.data || [];

                const combined = dataExcel.map(item => ({
                    ...item,
                    nombre_pieces: dataPieces.find(p => p.article === item.article)?.nombre_pieces || 0
                }));

                const tbody = document.getElementById('table-body');
                let totalKg = 0, totalPieces = 0;

                // إضافة الصفوف الفعلية فقط
                combined.forEach(item => {
                    totalKg += Number(item.quantite_commandee || 0);
                    totalPieces += Number(item.nombre_pieces || 0);
                    
                    tbody.innerHTML += `
                        <tr class="row-h">
                            <td class="text-left">${item.article}<br><small class="text-gray-600">${item.designation_article}</small></td>
                            <td>${Number(item.quantite_commandee).toFixed(2)}</td>
                            <td>${item.nombre_pieces}</td>
                            <td></td>
                            <td></td>
                        </tr>`;
                });

                document.getElementById('total-kg').innerText = totalKg.toFixed(2);
                document.getElementById('total-pieces').innerText = totalPieces;

            } catch (err) {
                console.error("Erreur:", err);
            }
        }
        
        if (cmd) loadData();
    </script>
</body>
</html>
