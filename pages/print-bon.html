<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bon de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
        table, th, td { border: 1px solid black; border-collapse: collapse; }
    </style>
</head>
<body class="p-4 bg-gray-100">
    <div id="bon-content" class="bg-white p-8 max-w-4xl mx-auto border border-gray-300 shadow-sm">
        <!-- العنوان -->
        <div class="border-2 border-black p-2 mb-6">
            <h1 class="text-3xl font-bold text-center">BON DE PRÉPARATION</h1>
        </div>

        <!-- المعلومات العلوية -->
        <div class="flex justify-between items-start mb-6">
            <div>
                <p><strong>Commande:</strong> <span id="val-cmd"></span></p>
                <p><strong>Client:</strong> <span id="val-client"></span></p>
                <p><strong>N° Lancement:</strong> <span id="val-lancement"></span></p>
                <p><strong>Date / Heure:</strong> <span id="val-date"></span></p>
            </div>
            <div id="qrcode" class="w-24 h-24 bg-gray-200 border border-black"></div>
        </div>

        <!-- الجدول -->
        <table class="w-full mb-8">
            <thead>
                <tr class="bg-gray-100">
                    <th class="p-2 w-1/2">Article</th>
                    <th class="p-2">Qté</th>
                    <th class="p-2">NB Pieces</th>
                    <th class="p-2">Lot</th>
                    <th class="p-2">Qté Préparée</th>
                </tr>
            </thead>
            <tbody id="table-body" class="text-center">
                <!-- الصفوف ستضاف بالـ JS -->
            </tbody>
        </table>

        <!-- الجدول السفلي والتوقيعات -->
        <div class="flex justify-between items-end">
            <table class="w-1/3">
                <tr><th class="p-2 bg-gray-100">TOTAL</th><th class="p-2 bg-gray-100">Qté KG</th><th class="p-2 bg-gray-100">Qté Pièces</th></tr>
                <tr><td class="p-2"></td><td id="total-kg" class="p-2 text-center"></td><td id="total-pieces" class="p-2 text-center"></td></tr>
            </table>

            <div class="flex gap-4">
                <div class="border border-black p-2 w-48 h-20 text-xs font-bold text-center">Signature Préparateur</div>
                <div class="border border-black p-2 w-48 h-20 text-xs font-bold text-center">Signature Contrôle</div>
            </div>
        </div>
    </div>

    <div class="text-center mt-6 no-print">
        <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded shadow">Imprimer</button>
    </div>

    <script type="module">
        import supabase from '../js/core/supabase.js';
        
        const params = new URLSearchParams(window.location.search);
        const cmd = params.get('cmd');
        
        document.getElementById('val-cmd').innerText = cmd;
        document.getElementById('val-client').innerText = params.get('client');
        document.getElementById('val-date').innerText = new Date().toLocaleString();

        // جلب البيانات من قاعدة البيانات لعرضها في الجدول
        async function loadData() {
            const { data, error } = await supabase
                .from('commandes_excel')
                .select('*')
                .eq('document_vente', cmd);

            if (data) {
                let totalKg = 0;
                const tbody = document.getElementById('table-body');
                data.forEach(item => {
                    totalKg += Number(item.quantite || 0);
                    tbody.innerHTML += `
                        <tr class="h-10">
                            <td>${item.article}</td>
                            <td>${item.quantite}</td>
                            <td>0</td>
                            <td></td>
                            <td></td>
                        </tr>`;
                });
                document.getElementById('total-kg').innerText = totalKg;
                document.getElementById('total-pieces').innerText = 0;
            }
        }
        loadData();
    </script>
</body>
</html>
