<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bon de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body { background: white; }
            .no-print { display: none; }
        }

        body { background-color: #f3f4f6; margin: 0; padding: 10px; }

        #bon-content {
            width: 280mm;
            height: 190mm;
            margin: 0 auto;
            background: white;
            padding: 5mm;
            display: flex;
            flex-direction: column;
            border: 1px solid #000;
            box-sizing: border-box;
        }

        .table-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        th { background-color: #e5e7eb; font-weight: bold; font-size: 12px; }
        td { border: 1px solid black; padding: 6px; text-align: center; font-size: 14px; }

        /* تعديلات العرض الجديدة: تقليص Article، زيادة Lot */
        .col-article { width: 30%; }  /* تم تقليصها */
        .col-qte { width: 12%; }      
        .col-lot { width: 25%; }      /* تم زيادتها لتكون أكبر */
        .col-info { width: 13%; }    
        .col-ctrl { width: 8%; }     
    </style>
</head>
<body>

    <div id="bon-content">
        <div class="border-2 border-black p-2 mb-2">
            <h1 class="text-2xl font-bold text-center">BON DE PRÉPARATION</h1>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-article">Article</th>
                        <th class="col-qte">Qté KG</th>
                        <th class="col-qte">NB Pieces</th>
                        <th class="col-lot">Lot</th>
                        <th class="col-info">QTÉ PRÉPARÉE</th>
                        <th class="col-ctrl">Control</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="flex justify-between items-end mt-auto">
            <table class="w-1/3">
                <tr class="bg-gray-100"><th>TOTAL</th><th>Qté KG</th><th>Qté Pièces</th></tr>
                <tr>
                    <td class="p-2 font-bold">TOTAL</td>
                    <td id="total-kg" class="font-bold">0.00</td>
                    <td id="total-pieces" class="font-bold">0</td>
                </tr>
            </table>
            <div class="flex gap-4">
                <div class="border border-black w-40 h-16 text-xs font-bold text-center pt-1">Signature Préparateur</div>
                <div class="border border-black w-40 h-16 text-xs font-bold text-center pt-1">Signature Contrôle</div>
            </div>
        </div>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';
        
        const params = new URLSearchParams(window.location.search);
        const cmd = params.get('cmd');
        
        async function loadData() {
            const [resExcel, resPieces] = await Promise.all([
                supabase.from('commandes_excel').select('*').eq('document_vente', cmd),
                supabase.from('commandes_clients_pieces').select('article, nombre_pieces').eq('document_vente', cmd)
            ]);

            const combined = (resExcel.data || []).map(item => ({
                ...item,
                nombre_pieces: (resPieces.data || []).find(p => p.article === item.article)?.nombre_pieces || 0
            }));

            const tbody = document.getElementById('table-body');
            let totalKg = 0, totalPieces = 0;

            combined.forEach(item => {
                const kg = Number(item.quantite_commandee || 0);
                const pieces = Number(item.nombre_pieces || 0);
                
                totalKg += kg;
                totalPieces += pieces;
                
                tbody.innerHTML += `
                    <tr>
                        <td class="text-left font-bold text-lg">${item.designation_article}</td>
                        <td>${kg.toFixed(2)}</td>
                        <td>${pieces}</td>
                        <td></td> <!-- Lot موسع -->
                        <td></td>
                        <td></td>
                    </tr>`;
            });

            document.getElementById('total-kg').innerText = totalKg.toFixed(2);
            document.getElementById('total-pieces').innerText = totalPieces;
        }
        
        if (cmd) loadData();
    </script>
</body>
</html>
