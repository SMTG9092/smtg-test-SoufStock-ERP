<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bon de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إعدادات الطباعة للـ A4 */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white; }
            .no-print { display: none; }
            #bon-content { box-shadow: none; border: none; width: 100%; }
        }

        body { background-color: #f3f4f6; padding: 20px; }
        
        /* الورقة */
        #bon-content {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: white;
            padding: 15mm;
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
        }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 8px; word-wrap: break-word; }
        
        /* تخلي التوقيعات ديما في التحت */
        .footer-section { margin-top: auto; }
    </style>
</head>
<body>

    <div id="bon-content">
        <!-- العنوان -->
        <div class="border-2 border-black p-3 mb-6">
            <h1 class="text-3xl font-bold text-center">BON DE PRÉPARATION</h1>
        </div>

        <!-- معلومات -->
        <div class="flex justify-between mb-8 text-sm">
            <div>
                <p><strong>Commande:</strong> <span id="val-cmd"></span></p>
                <p><strong>Client:</strong> <span id="val-client"></span></p>
            </div>
            <div class="w-20 h-20 border border-black flex items-center justify-center">QR</div>
        </div>

        <!-- الجدول -->
        <table class="w-full">
            <thead>
                <tr class="bg-gray-200">
                    <th style="width: 40%;">Article</th>
                    <th>Qté KG</th>
                    <th>NB Pieces</th>
                    <th>Lot</th>
                    <th>Qté Préparée</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- الصفوف ستضاف هنا -->
            </tbody>
        </table>

        <!-- التذييل -->
        <div class="footer-section">
            <div class="flex justify-between mt-8">
                <table class="w-1/3">
                    <tr><th>TOTAL</th><th>Qté KG</th><th>Qté Pièces</th></tr>
                    <tr>
                        <td class="h-10"></td>
                        <td id="total-kg" class="text-center font-bold">0</td>
                        <td id="total-pieces" class="text-center font-bold">0</td>
                    </tr>
                </table>
                <div class="flex gap-4">
                    <div class="border border-black w-48 h-24 text-xs font-bold text-center pt-2">Signature Préparateur</div>
                    <div class="border border-black w-48 h-24 text-xs font-bold text-center pt-2">Signature Contrôle</div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-6 no-print">
        <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-3 rounded">Imprimer le Bon</button>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';
        
        const params = new URLSearchParams(window.location.search);
        const cmd = params.get('cmd');
        document.getElementById('val-cmd').innerText = cmd;
        document.getElementById('val-client').innerText = params.get('client');

        async function loadData() {
            const [resExcel, resPieces] = await Promise.all([
                supabase.from('commandes_excel').select('*').eq('document_vente', cmd),
                supabase.from('commandes_clients_pieces').select('article, nombre_pieces').eq('document_vente', cmd)
            ]);

            const combined = (resExcel.data || []).map(item => ({
                ...item,
                nombre_pieces: (resPieces.data || []).find(p => p.article === item.article)?.nombre_pieces || 0
            }));

            const tbody = document.getElementById('table-body');
            let totalKg = 0, totalPieces = 0;

            combined.forEach(item => {
                totalKg += Number(item.quantite_commandee || 0);
                totalPieces += Number(item.nombre_pieces || 0);
                
                tbody.innerHTML += `
                    <tr class="h-12">
                        <td class="text-left text-sm">${item.article}<br><small>${item.designation_article}</small></td>
                        <td class="text-center">${Number(item.quantite_commandee).toFixed(2)}</td>
                        <td class="text-center">${item.nombre_pieces}</td>
                        <td></td>
                        <td></td>
                    </tr>`;
            });
            
            // إضافة صفوف فارغة إذا كان العدد أقل من 10 ليبقى التصميم متماسكاً
            for(let i = combined.length; i < 10; i++) {
                tbody.innerHTML += `<tr class="h-12"><td></td><td></td><td></td><td></td><td></td></tr>`;
            }

            document.getElementById('total-kg').innerText = totalKg.toFixed(2);
            document.getElementById('total-pieces').innerText = totalPieces;
        }
        
        loadData();
    </script>
</body>
</html>
