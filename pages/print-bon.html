<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bon de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        @media print { 
            @page { size: A4 landscape; margin: 4mm; } 
            body { background: white; -webkit-print-color-adjust: exact; } 
            .no-print { display: none; } 
        }
        body { background-color: #f3f4f6; margin: 0; padding: 10px; font-family: Arial, sans-serif; }
        #bon-content { width: 280mm; height: 190mm; margin: 0 auto; background: white; padding: 4mm 6mm; display: flex; flex-direction: column; border: 1px solid #000; box-sizing: border-box; justify-content: space-between; }
        
        .header-box { border: 2px solid black; padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        
        /* Table Layout Optimisé */
        .table-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; margin: 4px 0; border: 1px solid black; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e5e7eb !important; font-weight: bold; font-size: 10px; padding: 4px; border: 1px solid black; text-align: center; }
        td { border: 1px solid black; padding: 4px 2px; text-align: center; font-size: 11px; }
        
        .col-article { width: 42%; } 
        .col-kg { width: 9%; } 
        .col-pieces { width: 9%; } 
        .col-lot { width: 22%; } 
        .col-prep { width: 10%; } 
        .col-ctrl { width: 8%; }
        
        .product-name { font-weight: bold; font-size: 11px; text-align: left; padding-left: 6px; line-height: 1.2; }
        
        .footer-section { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="bon-content">
        <!-- HEADER / CADRE PRINCIPAL -->
        <div class="header-box">
            <div class="text-xs space-y-0.5">
                <p><strong>Commande:</strong> <span id="val-cmd"></span></p>
                <p><strong>Client:</strong> <span id="val-client"></span></p>
                <p><strong>Tournée:</strong> <span id="val-itineraire"></span></p>
            </div>

            <h1 class="text-xl font-bold uppercase text-center tracking-wide px-2">Bon de Préparation</h1>

            <div class="flex items-center gap-3">
                <div class="text-[10px] text-right space-y-0.5">
                    <p><strong>Création:</strong> <span id="val-date-creation"></span></p>
                    <p><strong>Livraison:</strong> <span id="val-date-livraison"></span></p>
                </div>
                <canvas id="qrcode" class="w-14 h-14"></canvas>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-article">Article</th>
                        <th class="col-kg">KG</th>
                        <th class="col-pieces">Pieces</th>
                        <th class="col-lot">Lot</th>
                        <th class="col-prep">QTÉ Prép.</th>
                        <th class="col-ctrl">Control</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- FOOTER & TOTALS -->
        <div class="footer-section">
            <table class="w-1/3 border border-black">
                <tr class="bg-gray-100">
                    <th class="border border-black p-1 text-[10px]">TOTAL</th>
                    <th class="border border-black p-1 text-[10px]">Qté KG</th>
                    <th class="border border-black p-1 text-[10px]">Pieces</th>
                </tr>
                <tr>
                    <td class="border border-black p-1 font-bold text-xs">TOTAL</td>
                    <td id="total-kg" class="border border-black p-1 font-bold text-xs">0.00</td>
                    <td id="total-pieces" class="border border-black p-1 font-bold text-xs">0</td>
                </tr>
            </table>

            <!-- Groupe dyal 3 l-mrabat b nafs l-irtfaç w qrab l-ba3diyathom (gap-2) -->
            <div class="flex items-center gap-2">
                <!-- Cadre Lancement -->
                <div class="border border-black w-52 h-14 px-2 py-1 flex flex-col justify-center text-[10px] bg-white space-y-0.5">
                    <p><strong>N° Lancement:</strong> <span id="val-num-lancement" class="font-bold text-blue-700"></span></p>
                    <p><strong>Lancement:</strong> <span id="val-date-lancement"></span> <span id="val-time-lancement" class="font-bold"></span></p>
                    <p><strong>Lancé par:</strong> <span id="val-lance-par" class="font-semibold italic"></span></p>
                </div>

                <!-- Signature Préparateur -->
                <div class="border border-black w-32 h-14 text-[10px] font-bold text-center pt-4 bg-white">Signature Préparateur</div>

                <!-- Signature Contrôle -->
                <div class="border border-black w-32 h-14 text-[10px] font-bold text-center pt-4 bg-white">Signature Contrôle</div>
            </div>
        </div>
    </div>

    <!-- BOUTON IMPRIMER -->
    <div class="text-center mt-4 no-print">
        <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-2 rounded font-bold hover:bg-blue-700 shadow">Imprimer</button>
    </div>

    <script type="module">
        import supabase from '/assets/js/core/supabase.js';
        const params = new URLSearchParams(window.location.search);
        const cmd = params.get('cmd');
        document.getElementById('val-cmd').innerText = cmd;

        async function loadData() {
            try {
                const { data: suiviData } = await supabase.from('suivi_commandes_lancer').select('num_lancement, client, itineraire, date_lancement, date_livraison, user_profiles:lance_par(nom_complet)').eq('document_vente', cmd).single();
                const { data: cmdData } = await supabase.from('commandes_excel').select('date_creation').eq('document_vente', cmd).order('created_at', { ascending: true }).limit(1).maybeSingle();

                if (suiviData) {
                    document.getElementById('val-num-lancement').innerText = suiviData.num_lancement || '-';
                    document.getElementById('val-client').innerText = suiviData.client || '-';
                    document.getElementById('val-itineraire').innerText = suiviData.itineraire || '-';
                    
                    document.getElementById('val-date-creation').innerText = cmdData?.date_creation ? new Date(cmdData.date_creation).toLocaleDateString() : '-';
                    
                    if (suiviData.date_lancement) {
                        const d = new Date(suiviData.date_lancement);
                        document.getElementById('val-date-lancement').innerText = d.toLocaleDateString();
                        document.getElementById('val-time-lancement').innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }
                    
                    document.getElementById('val-date-livraison').innerText = suiviData.date_livraison ? new Date(suiviData.date_livraison).toLocaleDateString() : '-';
                    document.getElementById('val-lance-par').innerText = suiviData.user_profiles?.nom_complet || '-';
                    
                    QRCode.toCanvas(document.getElementById('qrcode'), `Cmd: ${cmd} | Lancement: ${suiviData.num_lancement}`, { width: 56, margin: 0 });
                }
                
                const [resExcel, resPieces] = await Promise.all([
                    supabase.from('commandes_excel').select('*').eq('document_vente', cmd),
                    supabase.from('commandes_clients_pieces').select('article, nombre_pieces').eq('document_vente', cmd)
                ]);
                const combined = (resExcel.data || []).map(item => ({ ...item, nombre_pieces: (resPieces.data || []).find(p => p.article === item.article)?.nombre_pieces || 0 }));
                const tbody = document.getElementById('table-body');
                let totalKg = 0, totalPieces = 0;
                
                combined.forEach(item => {
                    const kg = Number(item.quantite_commandee || 0);
                    const pieces = Number(item.nombre_pieces || 0);
                    totalKg += kg; totalPieces += pieces;
                    tbody.innerHTML += `<tr>
                        <td class="product-name">
                            <span class="text-[9px] text-gray-800 font-bold font-mono block">${item.article || ''}</span>
                            ${item.designation_article || ''}
                        </td>
                        <td>${kg.toFixed(2)}</td>
                        <td>${pieces}</td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>`;
                });
                
                document.getElementById('total-kg').innerText = totalKg.toFixed(2);
                document.getElementById('total-pieces').innerText = totalPieces;
            } catch (err) { console.error("Erreur:", err); }
        }
        if (cmd) loadData();
    </script>
</body>
</html>
