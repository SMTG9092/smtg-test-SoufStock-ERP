<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Picking | SoufStock Enterprise</title>
        <!-- Dashboard CSS -->

    <link
        rel="stylesheet"
        href="../assets/css/dashboard.css">

    <link rel="stylesheet" href="../assets/css/picking.css">

</head>

<body>

    <div class="picking-page">

        <!-- ========================================================= -->
        <!-- Page Header -->
        <!-- ========================================================= -->

        <header class="page-header">

            <div class="page-title">

                <h1>
                    <i class="fas fa-dolly"></i>
                    Préparation des Commandes
                </h1>

                <p>
                    Gestion des opérations de Picking
                </p>

            </div>

            <div class="header-actions">

                <button
                    id="btnSave"
                    class="btn btn-success">

                    <i class="fas fa-save"></i>

                    Enregistrer

                </button>

                <button
                    id="btnValidate"
                    class="btn btn-primary">

                    <i class="fas fa-check-circle"></i>

                    Valider

                </button>

            </div>

        </header>

        <!-- ========================================================= -->
        <!-- Recherche Commande -->
        <!-- ========================================================= -->

        <section class="card">

            <div class="card-header">

                <h2>

                    <i class="fas fa-search"></i>

                    Recherche Commande

                </h2>

            </div>

            <div class="card-body">

                <div class="search-container">

                    <div class="form-group">

                        <label for="commandeInput">

                            Numéro Commande

                        </label>

                        <input
                            type="text"
                            id="commandeInput"
                            class="form-control"
                            placeholder="Ex : 4000790882"
                            autocomplete="off">

                    </div>

                    <button
                        id="btnSearch"
                        class="btn btn-primary">

                        <i class="fas fa-search"></i>

                        Charger

                    </button>

                    <button
                        id="btnScanner"
                        class="btn btn-secondary">

                        <i class="fas fa-barcode"></i>

                        Scanner

                    </button>

                </div>

            </div>

        </section>

        <!-- ========================================================= -->
        <!-- Informations Commande -->
        <!-- ========================================================= -->

        <section class="card">

            <div class="card-header">

                <h2>

                    <i class="fas fa-file-alt"></i>

                    Informations Commande

                </h2>

            </div>

            <div class="card-body">

                <div class="info-grid">
                                        <div class="info-item">

                        <label>Client</label>

                        <span id="clientName">-</span>

                    </div>

                    <div class="info-item">

                        <label>Date Création</label>

                        <span id="dateCreation">-</span>

                    </div>

                    <div class="info-item">

                        <label>Date Livraison</label>

                        <span id="dateLivraison">-</span>

                    </div>

                    <div class="info-item">

                        <label>Tournée</label>

                        <span id="tournee">-</span>

                    </div>

                    <div class="info-item">

                        <label>Chauffeur</label>

                        <span id="chauffeur">-</span>

                    </div>

                    <div class="info-item">

                        <label>Statut</label>

                        <span id="statutCommande"
                              class="badge badge-warning">

                            En préparation

                        </span>

                    </div>

                </div>

            </div>

        </section>

        <!-- ========================================================= -->
        <!-- Articles à Préparer -->
        <!-- ========================================================= -->

        <section class="card">

            <div class="card-header">

                <h2>

                    <i class="fas fa-boxes"></i>

                    Articles à Préparer

                </h2>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table
                        id="pickingTable"
                        class="table table-hover">

                        <thead>

                            <tr>

                                <th style="width:28%;">
                                    Article
                                </th>

                                <th style="width:8%;">
                                    Qté
                                </th>

                                <th style="width:10%;">
                                    Préparée
                                </th>

                                <th style="width:10%;">
                                    Nb Pièces
                                </th>

                                <th style="width:20%;">
                                    Lot
                                </th>

                                <th style="width:14%;">
                                    Qté Préparée
                                </th>

                                <th style="width:10%;">
                                    Action
                                </th>

                            </tr>

                        </thead>

                        <tbody id="pickingBody">

                            <tr class="empty-row">

                                <td colspan="7">

                                    Aucune commande chargée.

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>
                <!-- ========================================================= -->
        <!-- Résumé -->
        <!-- ========================================================= -->

        <section class="summary-section">

            <div class="summary-card">

                <span class="summary-label">

                    Articles

                </span>

                <span
                    id="totalArticles"
                    class="summary-value">

                    0

                </span>

            </div>

            <div class="summary-card">

                <span class="summary-label">

                    Qté Totale

                </span>

                <span
                    id="totalQuantity"
                    class="summary-value">

                    0

                </span>

            </div>

            <div class="summary-card">

                <span class="summary-label">

                    Qté Préparée

                </span>

                <span
                    id="preparedQuantity"
                    class="summary-value">

                    0

                </span>

            </div>

        </section>

        <!-- ========================================================= -->
        <!-- Footer Actions -->
        <!-- ========================================================= -->

        <footer class="page-footer">

            <div class="footer-left">

                <button
                    id="btnRefresh"
                    class="btn btn-secondary">

                    <i class="fas fa-sync-alt"></i>

                    Actualiser

                </button>

            </div>

            <div class="footer-right">

                <button
                    id="btnSaveFooter"
                    class="btn btn-success">

                    <i class="fas fa-save"></i>

                    Enregistrer

                </button>

                <button
                    id="btnValidateFooter"
                    class="btn btn-primary">

                    <i class="fas fa-check-circle"></i>

                    Valider le Picking

                </button>

            </div>

        </footer>

    </div>

    <!-- ========================================================= -->
    <!-- JavaScript -->
    <!-- ========================================================= -->

    <script type="module" src="../assets/js/picking.js"></script>

</body>

</html>
