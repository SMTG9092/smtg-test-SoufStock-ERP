<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoufStock Enterprise ERP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="sidebar-logo" alt="SoufStock">
            <div class="sidebar-brand">
                <h2>SoufStock</h2>
                <span>Enterprise ERP</span>
            </div>
        </div>

        <button id="sidebarToggle" class="sidebar-toggle">☰</button>

        <nav id="sidebarNav" class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="#" class="nav-item" data-page="stock"><i class="fas fa-boxes"></i> <span>Stock</span></a>
            <a href="#" class="nav-item" data-page="production"><i class="fas fa-industry"></i> <span>Production</span></a>
            <a href="#" class="nav-item" data-page="commandes"><i class="fas fa-shopping-cart"></i> <span>Commandes</span></a>
            <a href="#" class="nav-item" data-page="picking"><i class="fas fa-dolly"></i> <span>Préparation</span></a>
            <a href="#" class="nav-item" data-page="tunnels"><i class="fas fa-snowflake"></i> <span>Tunnels</span></a>
            <a href="#" class="nav-item" data-page="chambres"><i class="fas fa-warehouse"></i> <span>Chambres</span></a>
            <a href="#" class="nav-item" data-page="inventaire"><i class="fas fa-clipboard-check"></i> <span>Inventaire</span></a>
            <a href="#" class="nav-item" data-page="utilisateurs"><i class="fas fa-users"></i> <span>Utilisateurs</span></a>
            <a href="#" class="nav-item" data-page="parametres"><i class="fas fa-cogs"></i> <span>Paramètres</span></a>
        </nav>

        <div class="sidebar-footer">
            <div id="sidebarUser" class="sidebar-user">
                <img id="sidebarAvatar" src="assets/img/avatar.png" alt="Avatar">
                <div>
                    <h4 id="sidebarUserName">Chargement...</h4>
                    <span id="sidebarUserRole">...</span>
                </div>
            </div>
            <button id="logoutBtn" class="logout-btn">Déconnexion</button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-left">
                <h1 id="pageTitle">Dashboard</h1>
                <span id="pageSubtitle">SoufStock Enterprise ERP</span>
            </div>
            <div class="topbar-right">
                <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <button id="languageToggle" class="icon-btn"><i class="fas fa-language"></i></button>
                <button id="fullscreenBtn" class="icon-btn"><i class="fas fa-expand"></i></button>
            </div>
        </header>

        <section class="content" id="dashboardContent">
            <div id="dashboardView">
                <div class="page-header">
                    <h2>Tableau de bord</h2>
                    <p>Bienvenue <strong id="welcomeName">...</strong></p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon success"><i class="fas fa-boxes"></i></div><div class="stat-content"><span>Stock Total</span><h2 id="stockTotal">0</h2></div></div>
                    <div class="stat-card"><div class="stat-icon primary"><i class="fas fa-arrow-right-arrow-left"></i></div><div class="stat-content"><span>Mouvements</span><h2 id="movementCount">0</h2></div></div>
                    <div class="stat-card"><div class="stat-icon warning"><i class="fas fa-file-invoice"></i></div><div class="stat-content"><span>Commandes</span><h2 id="ordersCount">0</h2></div></div>
                    <div class="stat-card"><div class="stat-icon danger"><i class="fas fa-exclamation-circle"></i></div><div class="stat-content"><span>Alertes</span><h2 id="alertCount">0</h2></div></div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"></script>
<script type="module" src="assets/js/dashboard.js"></script>

</body>
</html>
