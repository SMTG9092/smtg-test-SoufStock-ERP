<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SoufStock ERP</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo">SoufStock</div>
            <nav id="nav-menu">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Stock</a>
                <a href="#">Commandes</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div class="user-info">
                    <span id="user-display">Chargement...</span>
                </div>
            </header>

            <div class="dashboard-grid">
                <section class="stats-cards" id="stats-container">
                    <div class="card"><h3>Total Stock</h3><p id="total-stock">0 KG</p></div>
                    <div class="card"><h3>Commandes</h3><p id="pending-orders">0</p></div>
                    <div class="card"><h3>Expéditions</h3><p id="today-shipments">0</p></div>
                </section>

                <section class="charts-row">
                    <div class="card chart-container">
                        <canvas id="stockEvolutionChart"></canvas>
                    </div>
                </section>

                <section class="tables-row">
                    <div class="card">
                        <h3>Commandes Récentes</h3>
                        <table id="recent-orders">
                            <thead><tr><th>ID</th><th>Client</th><th>Statut</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="./assets/js/dashboard.js"></script>
</body>
</html>
