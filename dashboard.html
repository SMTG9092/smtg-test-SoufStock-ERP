<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SoufStock Enterprise</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <header class="topbar">
                <button id="menuToggle">☰</button>
                <div class="search-box"><input type="text" data-i18n="search_placeholder" placeholder="Rechercher..."></div>
                <div class="controls">
                    <select id="langSelect"></select>
                    <button id="themeToggleBtn">🌓</button>
                    <div id="userProfile" class="user-dropdown"></div>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="welcome-section">
                    <h1 id="welcomeMsg"></h1>
                    <div id="quickActions" class="actions"></div>
                </div>

                <div class="stats-grid" id="statsContainer"></div>

                <div class="charts-grid">
                    <canvas id="stockChart"></canvas>
                    <canvas id="ordersChart"></canvas>
                </div>

                <div class="tables-grid">
                    <div class="data-card" id="ordersTableContainer"></div>
                    <div class="data-card" id="alertsTableContainer"></div>
                </div>
            </section>
        </main>
        <aside class="right-panel">
            <div id="notificationsPanel"></div>
            <div id="systemStatus"></div>
        </aside>
    </div>
    <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
